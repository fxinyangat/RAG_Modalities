services:
  rag-app:
    build: .
    image: my-rag-api:latest
    container_name: rag_service
    ports:
      - "8686:8686"
    env_file:
      - .env
    volumes:
      - ./dev_vector_db:/app/dev_vector_db
    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "htpp://localhost:8686/health"]
      interval: 59s
      timeout: 30s
      retries: 3
      start_period: 40s
